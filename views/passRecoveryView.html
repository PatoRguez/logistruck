<!DOCTYPE html>
<html lang="en">
<head>
    @extern('head')
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" type="text/css" href="views/styles/login.css">
</head>

<body>
    <section class="inicio">
        <div class="mainbox"> 
            <a href="./" class="link-volver">
                <img src="views/img/system/arrow_back.svg" width="30px">
            </a>
            <form method="post" id="form_pass_recovery">
                <div class="logo" >
                     <img src="views/img/system/logo_3.png">
                </div>
                <div class="logo-nombre" >
                    <img src="views/img/system/LOGISTRUCK.png">
                 </div>
                <h3>Recuperar Contraseña</h3>
                <p style="margin: 1rem 0">
                    ¿Has olvidado tu Contraseña?
                    <br>
                    <span id="msg_error_form" style="color: red;font-size: .8rem"></span>
                </p>
                <div class="input-box">
                    <label>
                        <input type="email" id="pass" name="email" placeholder="Introduce tu email" required>
                        <img src="views/img/system/alternate_email.svg">
                    </label> 
                </div>
                <div class="boton">
                    <button type="submit" id="btn_submit" class="btn" name="btn-submit">Enviar</button>
                </div>
            </form>
        </div>
    </section>
    
    <!-- SCRIPTS -->
    <script src="views/js/requestApis.js"></script>
    <script src="views/js/passRecovery.js"></script>
</body>
</html>
