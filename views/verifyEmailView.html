<!DOCTYPE html>
<html lang="en">
<head>
    @extern('head')
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" type="text/css" href="views/styles/login.css">
</head>
<body>
    <section class="inicio">
        <div class="mainbox">
            <a href="./" class="link-volver">
                <img src="views/img/system/arrow_back.svg" width="30px">
            </a>
            <form id="form_verify">
                 <div class="logo" >
                     <img src="views/img/system/logo_3.png">
                </div>
                <div class="logo-nombre" >
                    <img src="views/img/system/LOGISTRUCK.png">
                 </div>
                <h2>Verificar Correo</h2>
                <p style="margin: 1rem 0;font-size: .8rem">
                    Introduce el código que fue enviado a: <b>{{CORREO}}</b>
                </p>
                <div class="input-box">
                    <label>
                        <input type="number" id="pass" name="codigo" placeholder="Introduce el código" min="0"required>
                        <img src="views/img/system/lock.svg">
                    </label>
                    <span style="color: red;font-size: .7rem" id="msg_error_form"></span> 
                </div>
                <div class="boton">
                    <button type="submit" id="btn_submit" class="btn" name="btn-submit-veri">Enviar</button>
                </div>
            </form>
        </div>
    </section>

    <!-- SCRIPTS -->
    <script src="./views/js/requestApis.js"></script>
    <script src="./views/js/verifyCorreo.js"></script>
</body>
</html>
